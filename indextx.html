<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document Scanner</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    body {
        padding: 20px;
    }
    #videoElement, #canvas {
        width: 100%;
        max-width: 500px;
        margin-bottom: 10px;
    }
    #scannedText {
        margin-top: 20px;
    }
</style>
</head>
<body>
<div class="container">
    <div class="row">
        <div class="col-md-6">
            <label for="block" class="form-label">Block:</label>
            <select id="block" class="form-select">
                <option value="">Select Block</option>
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="C">C</option>
                <option value="D">D</option>
                <option value="E">E</option>
            </select>
            
            <select id="flatSelect" class="form-select" style="display: none;">
                <option value="">Select Flat Number</option>
            </select>
            
        </div>
    </div>
    <div class="row">
        <div class="col-md-12">
            <video id="videoElement" autoplay class="mt-3"></video>
        </div>
    </div>
    <div class="row">
        <div class="col-md-12">
            <button id="scanButton" class="btn btn-primary mt-3">Scan Image</button>
        </div>
    </div>
    <div class="row">
        <div class="col-md-12">
            <canvas id="canvas" style="display: none;"></canvas>
        </div>
    </div>
    <div class="row">
        <div class="col-md-12">
            <div id="scannedText" style="display: none;">
                <label for="scannedTextInput" class="form-label">Scanned Text:</label>
                <input type="text" id="scannedTextInput" class="form-control" readonly>
            </div>
        </div>
    </div>
    <div class="row">
        <div class="col-md-12">
            <form id="submitForm" method="post" action="process_form.php">
                <input type="hidden" id="scannedTextHidden" name="scannedTextHidden">
                <input type="hidden" id="blockInput" name="block"> <!-- Hidden input for block -->
                <input type="hidden" id="flatNumberInput" name="flatNumber"> <!-- Hidden input for flat number -->
                <button type="submit" class="btn btn-primary mt-3">Submit</button>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/posenet"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/face-landmarks-detection"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/face-api"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/face-api/dist/face-api.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/body-pix"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/handpose"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/ocr-display"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js"></script>

<script>
    const video = document.getElementById('videoElement');
    const scanButton = document.getElementById('scanButton');
    const scannedText = document.getElementById('scannedText');
    const scannedTextInput = document.getElementById('scannedTextInput');
    const scannedTextHidden = document.getElementById('scannedTextHidden');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const block = document.getElementById('block');
    const flatSelect = document.getElementById('flatSelect');
    const blockInput = document.getElementById('blockInput');
    const flatNumberInput = document.getElementById('flatNumberInput');

    // Request access to the camera
    navigator.mediaDevices.getUserMedia({ video: true })
        .then(function(stream) {
            video.srcObject = stream;
        })
        .catch(function(err) {
            console.error('Error accessing camera:', err);
            alert('An error occurred while accessing the camera. Please check the console for more details.');
        });

    // Populate flat numbers based on block selection
    block.addEventListener('change', function () {
        const selectedBlock = block.value;
        if (selectedBlock) {
            populateFlatNumbers(selectedBlock);
            flatSelect.style.display = 'block';
        } else {
            flatSelect.style.display = 'none';
        }
    });

    // Capture a frame from the video stream and display it on canvas
    scanButton.addEventListener('click', function () {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imageData = canvas.toDataURL('image/jpeg');

        // Perform OCR on the captured image
        Tesseract.recognize(
            imageData,
            'eng', // English language
            { logger: m => console.log(m) } // Optional logger function to see progress
        ).then(({ data: { text } }) => {
            // Set scanned text to the input field
            scannedTextInput.value = text;
            scannedTextHidden.value = text; // Set scanned text to hidden field
            scannedText.style.display = 'block';
        }).catch(error => {
            console.error('Error extracting text from image:', error);
            alert('Error extracting text from image. Please try again.');
        });
    });

    // Function to populate flat numbers based on block selection
    function populateFlatNumbers(selectedBlock) {
        // Clear previous options
        flatSelect.innerHTML = '<option value="">Select Flat Number</option>';
        // Add new options based on the selected block
        for (let i = 1; i <= 5; i++) {
            const option = document.createElement('option');
            option.value = selectedBlock + i;
            option.textContent = selectedBlock + i;
            flatSelect.appendChild(option);
        }
    }

    // Update hidden input fields before form submission
    document.getElementById('submitForm').addEventListener('submit', function () {
        blockInput.value = block.value;
        flatNumberInput.value = flatSelect.value;
    });
</script>
</body>
</html>
